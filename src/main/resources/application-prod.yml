gemini:
  api:
    key: ${GEMINI_API_KEY:}
  embedding:
    model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    output-dimensionality: ${GEMINI_EMBEDDING_DIMENSION:768}

qdrant:
  url: ${QDRANT_URL:}
  api:
    key: ${QDRANT_API_KEY:}

clients:
  gemini:
    url: https://generativelanguage.googleapis.com
  qdrant:
    url: ${QDRANT_URL:}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookstore_book}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:bookstore}
    password: ${DB_PASSWORD:bookstore}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_MAX_LIFETIME:600000}
      keepalive-time: ${DB_KEEPALIVE_TIME:120000}  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
