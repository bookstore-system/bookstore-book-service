gemini:
  api:
    key: ${GEMINI_API_KEY:}
  embedding:
    model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    output-dimensionality: ${GEMINI_EMBEDDING_DIMENSION:768}

qdrant:
  url: ${QDRANT_URL:}
  api:
    key: ${QDRANT_API_KEY:}

clients:
  gemini:
    url: https://generativelanguage.googleapis.com
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}
  review:
    url: ${REVIEW_SERVICE_URL:http://review-service:8080}
  order:
    url: ${ORDER_SERVICE_URL:http://order-service:8080}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

app:
  jwt:
    keys-dir: ${APP_JWT_KEYS_DIR:/key}

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bookstore_book}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:bookstore}
    password: ${DB_PASSWORD:bookstore}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
