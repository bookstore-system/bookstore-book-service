app:
  jwt:
    keys-dir: ${APP_JWT_KEYS_DIR:../Plan-And-Document/key}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
  embedding:
    model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
    output-dimensionality: ${GEMINI_EMBEDDING_DIMENSION:768}

qdrant:
  url: ${QDRANT_URL:}
  api:
    key: ${QDRANT_API_KEY:}

clients:
  gemini:
    url: https://generativelanguage.googleapis.com
  qdrant:
    url: ${QDRANT_URL:http://localhost:6333}

bookstore:
  saga:
    enabled: true
    commands-exchange: bookstore.commands
    events-exchange: bookstore.events
    commands-queue: book.commands.queue
    reservation-ttl-minutes: 30
    expiry-job-delay-ms: 300000

spring:
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://book-db:3306/bookstore_book?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:bookstore}
    password: ${SPRING_DATASOURCE_PASSWORD:bookstore}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
