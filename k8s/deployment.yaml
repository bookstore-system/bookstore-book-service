apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service-deployment
  labels:
    app: book-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
      - name: book-service
        image: truongdocker1/bookstore-book-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: APP_JWT_KEYS_DIR
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: APP_JWT_KEYS_DIR
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: DB_NAME
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: RABBITMQ_PORT
        - name: RABBITMQ_VIRTUAL_HOST
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: RABBITMQ_VIRTUAL_HOST
        - name: GEMINI_EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: GEMINI_EMBEDDING_MODEL
        - name: GEMINI_EMBEDDING_DIMENSION
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: GEMINI_EMBEDDING_DIMENSION
        - name: REVIEW_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: REVIEW_SERVICE_URL
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: book-service-config
              key: ORDER_SERVICE_URL

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: DB_USERNAME

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: DB_PASSWORD
        - name: CLOUDINARY_CLOUD_NAME
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: CLOUDINARY_CLOUD_NAME
        - name: CLOUDINARY_API_KEY
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: CLOUDINARY_API_KEY
        - name: CLOUDINARY_API_SECRET
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: CLOUDINARY_API_SECRET
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: RABBITMQ_PASSWORD
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: GEMINI_API_KEY
        - name: QDRANT_URL
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: QDRANT_URL
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: book-service-secret
              key: QDRANT_API_KEY
        volumeMounts:
        - name: jwt-public-key
          mountPath: /key
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: jwt-public-key
        secret:
          secretName: book-service-jwt-public-key
          items:
          - key: public.pem
            path: public.pem
