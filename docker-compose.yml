version: '3.8'

services:
  book-db:
    image: mysql:8.0
    container_name: book-db
    environment:
      MYSQL_DATABASE: bookstore_book
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: bookstore
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - book_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - bookstore-network

  book-service:
    build: 
      context: .
      target: build
    container_name: book-service
    depends_on:
      book-db:
        condition: service_healthy
    ports:
      - "8082:8080"
    volumes:
      - .:/build
      - ~/.m2:/root/.m2
    command: mvn spring-boot:run -Dspring-boot.run.profiles=docker
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://book-db:3306/bookstore_book?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bookstore
      SPRING_DATASOURCE_PASSWORD: bookstore
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - bookstore-network

volumes:
  book_mysql_data:

networks:
  bookstore-network:
    name: bookstore-network